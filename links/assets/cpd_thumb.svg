  <text x="160" y="32" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#555">200+ Officers</text>

  <!-- Arrow down + split -->
  <line x1="160" y1="36" x2="160" y2="50" stroke="#f5f0eb" stroke-width="1.5"/>
  <line x1="46" y1="50" x2="274" y2="50" stroke="#f5f0eb" stroke-width="1.5"/>
  <line x1="46" y1="50" x2="46" y2="60" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="160" y1="50" x2="160" y2="60" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="274" y1="50" x2="274" y2="60" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>

