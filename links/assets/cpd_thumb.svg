  <rect x="8" y="62" width="76" height="44" fill="#1e1e1e" stroke="#aaa" stroke-width="1"/>
  <text x="46" y="76" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#7000ff">MODULE 01</text>
  <text x="46" y="88" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">Purchase /</text>
  <text x="46" y="99" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">Repair</text>

  <!-- Module 02 -->
  <rect x="122" y="62" width="76" height="44" fill="#1e1e1e" stroke="#aaa" stroke-width="1"/>
  <text x="160" y="76" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#7000ff">MODULE 02</text>
  <text x="160" y="88" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">Leave</text>
  <text x="160" y="99" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">Mgmt</text>

  <!-- Module 03 -->
  <rect x="236" y="62" width="76" height="44" fill="#1e1e1e" stroke="#aaa" stroke-width="1"/>
  <text x="274" y="76" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#7000ff">MODULE 03</text>
  <text x="274" y="88" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">LDAP</text>
  <text x="274" y="99" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">Notif.</text>

  <!-- Merge arrows down to AWS -->
  <line x1="46" y1="106" x2="46" y2="116" stroke="#f5f0eb" stroke-width="1.5"/>
  <line x1="46" y1="116" x2="158" y2="116" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="160" y1="106" x2="160" y2="114" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="274" y1="106" x2="274" y2="116" stroke="#f5f0eb" stroke-width="1.5"/>
  <line x1="274" y1="116" x2="162" y2="116" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- AWS box (cream) -->
  <rect x="90" y="118" width="140" height="30" fill="#f5f0eb" stroke="#111" stroke-width="1"/>
  <text x="160" y="130" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#111">AWS EC2 · RDS · S3</text>
