<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f5f0eb"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#111"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#7000ff" letter-spacing="4">COOKEVILLE PD MODULES</text>
  <line x1="60" y1="46" x2="1140" y2="46" stroke="#f5f0eb" stroke-width="1.5"/>
  <text x="600" y="63" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa" letter-spacing="2">SAAS MODULES + SECURITY ASSESSMENT</text>

  <!-- Users box (inverted to cream — the highlighted box) -->
  <rect x="480" y="74" width="240" height="70" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="600" y="101" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#555" letter-spacing="2">USERS</text>
  <text x="600" y="117" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#111">POLICE DEPARTMENT</text>
  <text x="600" y="133" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Officers · Supervisors · Admin Staff (200+)</text>

  <!-- Arrow from users → 3 modules -->
  <line x1="600" y1="144" x2="600" y2="168" stroke="#f5f0eb" stroke-width="2"/>
