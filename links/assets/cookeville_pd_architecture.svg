  <line x1="200" y1="168" x2="1000" y2="168" stroke="#f5f0eb" stroke-width="2"/>
  <!-- Arrow to Module 1 -->
  <line x1="200" y1="168" x2="200" y2="200" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow to Module 2 -->
  <line x1="600" y1="168" x2="600" y2="200" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow to Module 3 -->
  <line x1="1000" y1="168" x2="1000" y2="200" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Module 1: Purchase/Repair -->
  <rect x="80" y="202" width="240" height="110" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="200" y="226" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">MODULE 01</text>
  <text x="200" y="242" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">PURCHASE /</text>
  <text x="200" y="257" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">REPAIR REQUEST</text>
  <text x="200" y="274" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Approve / Deny Workflows</text>
  <text x="200" y="289" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">45,000+ Dept. Items</text>
  <text x="200" y="304" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">Node.js · Express · SQL</text>

  <!-- Module 2: Leave Management -->
  <rect x="480" y="202" width="240" height="110" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="600" y="226" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">MODULE 02</text>
  <text x="600" y="242" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">LEAVE</text>
  <text x="600" y="257" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">MANAGEMENT</text>
  <text x="600" y="274" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Request · Approve · Track</text>
  <text x="600" y="289" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">200+ Employees</text>
  <text x="600" y="304" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">Node.js · Express · MariaDB</text>

