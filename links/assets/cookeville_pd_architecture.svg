  <text x="1000" y="226" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">MODULE 03</text>
  <text x="1000" y="242" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">LDAP</text>
  <text x="1000" y="257" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">NOTIFICATION</text>
  <text x="1000" y="274" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Real-Time Status Alerts</text>
  <text x="1000" y="289" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Directory Integration</text>
  <text x="1000" y="304" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">LDAP · Node.js</text>

  <!-- Arrows down to AWS -->
  <line x1="200" y1="312" x2="200" y2="360" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="200" y1="360" x2="598" y2="360" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="312" x2="600" y2="358" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1000" y1="312" x2="1000" y2="360" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="1000" y1="360" x2="602" y2="360" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS Infrastructure box (inverted to cream — highlighted) -->
  <rect x="380" y="362" width="440" height="78" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="600" y="390" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#555" letter-spacing="2">INFRASTRUCTURE</text>
  <text x="600" y="407" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#111">AWS EC2 · RDS · S3</text>
  <text x="600" y="424" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">GitHub Actions CI/CD · Production Deployment</text>

  <!-- Security Assessment band -->
  <rect x="80" y="458" width="1040" height="62" fill="#1e1e1e" stroke="#7000ff" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="200" y="476" font-family="'Space Mono','Courier New',monospace" font-size="8" font-weight="700" fill="#7000ff" letter-spacing="2">SECURITY ASSESSMENT</text>
  <text x="200" y="494" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">OWASP ZAP · OpenVAS · Nuclei · Nmap · Sslyze · Snyk</text>
  <text x="200" y="510" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Vulnerability triage across web app, infrastructure, and dependencies</text>

  <!-- Footer -->
  <line x1="60" y1="534" x2="1140" y2="534" stroke="#f5f0eb" stroke-width="1"/>
  <text x="600" y="550" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa" letter-spacing="1">Node.js · Express · MariaDB · AWS EC2 / RDS / S3 · GitHub Actions · OWASP ZAP · OpenVAS</text>
