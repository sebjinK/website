<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f5f0eb"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#111"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#7000ff" letter-spacing="4">AGENTIC SECURITY TRIAGE SYSTEM</text>
  <line x1="60" y1="46" x2="1140" y2="46" stroke="#f5f0eb" stroke-width="1.5"/>
  <text x="600" y="63" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa" letter-spacing="2">INGESTION + CLASSIFICATION PIPELINE</text>

  <!-- Box 1: Log Ingest -->
  <rect x="162" y="76" width="160" height="88" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="242" y="108" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">LOG INGEST</text>
  <text x="242" y="124" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">CloudWatch / Apps</text>
  <text x="242" y="138" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">System Logs</text>

  <!-- Arrow 1→2 -->
  <line x1="322" y1="120" x2="381" y2="120" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: AWS S3 -->
  <rect x="383" y="76" width="160" height="88" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="463" y="104" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">AWS</text>
  <text x="463" y="119" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">S3 BUCKET</text>
  <text x="463" y="135" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Log Storage</text>
  <text x="463" y="149" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Ingestion Bucket</text>

  <!-- Arrow 2→3 -->
  <line x1="543" y1="120" x2="602" y2="120" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: Lambda -->
  <rect x="604" y="76" width="160" height="88" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="684" y="104" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">AWS</text>
  <text x="684" y="119" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">LAMBDA</text>
  <text x="684" y="135" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Event Processing</text>
  <text x="684" y="149" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">S3 Trigger</text>

  <!-- Arrow 3→4 -->
  <line x1="764" y1="120" x2="833" y2="120" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: Bedrock / Claude Haiku (inverted to cream — the highlighted box) -->
  <rect x="835" y="76" width="203" height="88" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="937" y="104" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555" letter-spacing="2">AMAZON BEDROCK</text>
  <text x="937" y="120" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#7000ff">CLAUDE HAIKU</text>
  <text x="937" y="136" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Alert Classification</text>
  <text x="937" y="150" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">+ Confidence Scoring</text>

  <!-- Arrow Box4 → Diamond -->
  <line x1="937" y1="164" x2="937" y2="244" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Confidence Diamond: cx=937, cy=290 -->
  <polygon points="937,246 995,290 937,334 879,290" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="937" y="285" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" font-weight="700" fill="#f5f0eb">CONFIDENCE</text>
  <text x="937" y="299" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" font-weight="700" fill="#f5f0eb">THRESHOLD</text>

  <!-- HIGH label -->
  <text x="806" y="282" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">HIGH ≥ 0.8</text>

  <!-- Arrow: diamond left → bend → auto-resolve top -->
  <path d="M879,290 H650 V332" fill="none" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Auto-resolve box -->
  <rect x="540" y="334" width="220" height="78" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="650" y="368" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">AUTO-RESOLVED</text>
  <text x="650" y="385" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Alert Closed</text>
  <text x="650" y="399" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">No Action Required</text>

  <!-- LOW label -->
  <text x="1044" y="282" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">LOW &lt; 0.8</text>

  <!-- Arrow: diamond right → SNS box -->
  <line x1="995" y1="290" x2="1055" y2="290" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SNS box -->
  <rect x="1057" y="258" width="120" height="64" fill="#1e1e1e" stroke="#7000ff" stroke-width="2"/>
  <text x="1117" y="284" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">AWS SNS</text>
  <text x="1117" y="300" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Escalation Alert</text>
  <text x="1117" y="314" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Notification</text>

  <!-- Arrow SNS → Analyst -->
  <line x1="1117" y1="322" x2="1117" y2="373" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Human Analyst box (inverted to cream — the highlighted box) -->
  <rect x="1057" y="375" width="120" height="78" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="1117" y="407" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#111">ANALYST</text>
  <text x="1117" y="423" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Manual Review</text>
  <text x="1117" y="438" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Decision</text>

  <!-- Footer -->
  <line x1="60" y1="490" x2="1140" y2="490" stroke="#f5f0eb" stroke-width="1"/>
  <text x="600" y="507" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa" letter-spacing="1">Python · AWS S3 · Lambda · Amazon Bedrock · Claude Haiku · SNS</text>
</svg>
