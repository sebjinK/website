<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f5f0eb"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#aaa"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#111"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#7000ff" letter-spacing="4">FITNESS BUDDY</text>
  <line x1="60" y1="46" x2="1140" y2="46" stroke="#f5f0eb" stroke-width="1.5"/>
  <text x="600" y="63" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa" letter-spacing="2">CONVERSATIONAL WELLNESS SYSTEM — STACK ARCHITECTURE</text>

  <!-- Docker Compose wrapper (dashed) -->
  <rect x="80" y="190" width="1040" height="270" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="96" y="208" font-family="'Space Mono','Courier New',monospace" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2">DOCKER COMPOSE</text>

  <!-- CLIENT LAYER -->
  <text x="600" y="90" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="3">CLIENT LAYER</text>
  <rect x="420" y="97" width="360" height="76" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="600" y="127" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#f5f0eb">BROWSER / MOBILE CLIENT</text>
  <text x="600" y="145" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa">Natural Language Input · Health Tracking UI</text>
  <text x="600" y="160" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">React Frontend</text>

  <!-- Arrow client ↓ API -->
  <line x1="600" y1="173" x2="600" y2="227" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Bidirectional label -->
  <text x="615" y="205" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">request</text>
  <!-- Arrow API ↑ client -->
  <line x1="590" y1="226" x2="590" y2="174" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-up)"/>
  <text x="540" y="205" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">response</text>

  <!-- APPLICATION LAYER label -->
  <text x="600" y="222" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="3">APPLICATION LAYER</text>

  <!-- Node.js / Express box (inverted to cream — the highlighted box) -->
  <rect x="420" y="228" width="360" height="80" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="600" y="258" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#111">NODE.JS + EXPRESS</text>
  <text x="600" y="275" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">REST API · Session Management</text>
  <text x="600" y="290" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Request Routing · Input Parsing</text>
  <text x="600" y="303" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#777">[ container ]</text>

  <!-- Arrow API → Qwen -->
  <path d="M420,270 H240 V342" fill="none" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow API → MariaDB -->
  <path d="M780,270 H960 V342" fill="none" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DATA LAYER label -->
  <text x="240" y="337" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">AI LAYER</text>
  <text x="960" y="337" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#7000ff" letter-spacing="2">DATA LAYER</text>

  <!-- Qwen 2.5 box (accent, unchanged) -->
  <rect x="110" y="344" width="260" height="90" fill="#7000ff" stroke="#7000ff" stroke-width="2"/>
  <text x="240" y="374" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#fff">QWEN 2.5 INSTRUCT</text>
  <text x="240" y="391" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#ddd">Personalized Health</text>
  <text x="240" y="406" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#ddd">Recommendations</text>
  <text x="240" y="421" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#ccc">[ container · on-device ]</text>

  <!-- MariaDB box -->
  <rect x="830" y="344" width="260" height="90" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="960" y="374" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="10" font-weight="700" fill="#f5f0eb">MARIADB</text>
  <text x="960" y="391" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">User Profiles</text>
  <text x="960" y="406" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Health Records</text>
  <text x="960" y="421" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">[ container ]</text>

  <!-- Footer -->
  <line x1="60" y1="490" x2="1140" y2="490" stroke="#f5f0eb" stroke-width="1"/>
  <text x="600" y="507" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa" letter-spacing="1">Node.js · Express · Qwen 2.5 Instruct · MariaDB · Docker Compose · React</text>
</svg>
