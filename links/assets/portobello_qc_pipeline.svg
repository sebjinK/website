<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f5f0eb"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#111"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#7000ff" letter-spacing="4">PORTOBELLO AMERICA QC</text>
  <line x1="60" y1="46" x2="1140" y2="46" stroke="#f5f0eb" stroke-width="1.5"/>
  <text x="600" y="63" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa" letter-spacing="2">FACTORY FLOOR QUALITY CONTROL PIPELINE</text>

  <!-- Stage 1: Camera Input -->
  <rect x="80" y="80" width="180" height="88" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#555" letter-spacing="2">INPUT</text>
  <text x="170" y="126" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#111">FACTORY</text>
  <text x="170" y="141" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#111">CAMERA</text>
  <text x="170" y="157" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Live tile feed</text>

  <!-- Arrow Camera → split -->
  <line x1="260" y1="124" x2="318" y2="124" stroke="#f5f0eb" stroke-width="2"/>
  <!-- Split up to CNN -->
  <line x1="318" y1="124" x2="318" y2="95" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="318" y1="95" x2="373" y2="95" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Split down to OCR -->
  <line x1="318" y1="124" x2="318" y2="200" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="318" y1="200" x2="373" y2="200" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CNN Defect Detection box (accent, unchanged) -->
  <rect x="375" y="60" width="220" height="70" fill="#7000ff" stroke="#7000ff" stroke-width="2"/>
  <text x="485" y="88" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#ddd" letter-spacing="2">COMPUTER VISION</text>
  <text x="485" y="104" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#fff">CNN DEFECT</text>
  <text x="485" y="119" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#fff">DETECTION</text>

  <!-- PaddleOCR box -->
  <rect x="375" y="165" width="220" height="70" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="485" y="191" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#7000ff" letter-spacing="2">OCR</text>
  <text x="485" y="207" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#f5f0eb">PADDLEOCR</text>
  <text x="485" y="222" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa">Lot Code Reading</text>

  <!-- Labels for CNN / OCR branches -->
  <text x="345" y="80" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">VISUAL</text>
  <text x="345" y="188" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">LOT CODE</text>

  <!-- Merge arrows → FastAPI -->
  <line x1="595" y1="95" x2="660" y2="95" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="660" y1="95" x2="660" y2="160" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="595" y1="200" x2="660" y2="200" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="660" y1="200" x2="660" y2="160" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="660" y1="160" x2="700" y2="160" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- FastAPI box (inverted to cream — highlighted) -->
  <rect x="702" y="118" width="180" height="84" fill="#f5f0eb" stroke="#111" stroke-width="2"/>
  <text x="792" y="148" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#555" letter-spacing="2">BACKEND</text>
  <text x="792" y="163" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#111">FASTAPI</text>
  <text x="792" y="179" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">Results Aggregation</text>
  <text x="792" y="193" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#555">[ Python ]</text>

  <!-- Arrow FastAPI → React -->
  <line x1="882" y1="160" x2="940" y2="160" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- React Dashboard box -->
  <rect x="942" y="118" width="180" height="84" fill="#1e1e1e" stroke="#aaa" stroke-width="2"/>
  <text x="1032" y="148" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#7000ff" letter-spacing="2">FRONTEND</text>
  <text x="1032" y="163" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#f5f0eb">REACT</text>
  <text x="1032" y="179" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">QC Dashboard</text>
  <text x="1032" y="193" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Live Results View</text>

  <!-- Arrow down: FastAPI/React → Docker/GCP -->
  <line x1="792" y1="202" x2="792" y2="280" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="1032" y1="202" x2="1032" y2="280" stroke="#f5f0eb" stroke-width="2"/>
  <line x1="792" y1="280" x2="912" y2="280" stroke="#f5f0eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1032" y1="280" x2="912" y2="280" stroke="#f5f0eb" stroke-width="2"/>

  <!-- Docker / GCP box -->
  <rect x="700" y="282" width="424" height="80" fill="#1e1e1e" stroke="#aaa" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="912" y="314" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="9" fill="#aaa" letter-spacing="3">INFRASTRUCTURE</text>
  <text x="912" y="332" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="11" font-weight="700" fill="#f5f0eb">DOCKER → GCP</text>
  <text x="912" y="349" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">Containerized Deployment · Cloud Hosting</text>

  <!-- CNN output label -->
  <text x="485" y="148" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#ddd">Surface defect mask + confidence</text>
  <!-- OCR output label -->
  <text x="485" y="246" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#aaa">Lot ID + traceability metadata</text>

  <!-- Process labels below CNN/OCR -->
  <text x="380" y="398" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">01  Camera captures tile on conveyor</text>
  <text x="380" y="415" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">02  CNN scores surface — OCR reads lot code in parallel</text>
  <text x="380" y="432" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa">03  FastAPI aggregates results → React dashboard renders QC report</text>

  <!-- Footer -->
  <line x1="60" y1="490" x2="1140" y2="490" stroke="#f5f0eb" stroke-width="1"/>
  <text x="600" y="507" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="8" fill="#aaa" letter-spacing="1">Python · PyTorch · PaddleOCR · React · FastAPI · Docker · GCP</text>
</svg>
