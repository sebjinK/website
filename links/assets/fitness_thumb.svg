<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0,6 2.5,0 5" fill="#f5f0eb"/>
    </marker>
    <marker id="b" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0,6 2.5,0 5" fill="#aaa"/>
    </marker>
  </defs>

  <rect width="320" height="160" fill="#111"/>

  <!-- Docker Compose wrapper -->
  <rect x="80" y="76" width="230" height="74" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="88" y="87" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#aaa">DOCKER COMPOSE</text>

  <!-- Client (dark) -->
  <rect x="8" y="50" width="100" height="44" fill="#1e1e1e" stroke="#aaa" stroke-width="1"/>
  <text x="58" y="68" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">BROWSER /</text>
  <text x="58" y="80" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">MOBILE</text>
  <text x="58" y="91" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#aaa">React</text>

  <!-- Request arrow -->
  <line x1="108" y1="68" x2="128" y2="68" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Response arrow (dashed) -->
  <line x1="128" y1="76" x2="108" y2="76" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#b)"/>

  <!-- Node.js / Express (cream) -->
  <rect x="130" y="50" width="100" height="54" fill="#f5f0eb" stroke="#111" stroke-width="1"/>
  <text x="180" y="70" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#111">NODE.JS</text>
  <text x="180" y="82" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#111">EXPRESS</text>
  <text x="180" y="94" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="6" fill="#555">REST API</text>

  <!-- Fork arrows down -->
  <path d="M155,104 L155,120 L118,120 L118,132" fill="none" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M205,104 L205,120 L242,120 L242,132" fill="none" stroke="#f5f0eb" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Qwen (purple) -->
  <rect x="86" y="134" width="64" height="22" fill="#7000ff" stroke="#7000ff" stroke-width="1"/>
  <text x="118" y="148" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#fff">Qwen 2.5</text>

  <!-- MariaDB (dark) -->
  <rect x="210" y="134" width="64" height="22" fill="#1e1e1e" stroke="#aaa" stroke-width="1"/>
  <text x="242" y="148" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" font-weight="700" fill="#f5f0eb">MariaDB</text>

  <!-- Label -->
  <text x="160" y="20" text-anchor="middle" font-family="'Space Mono','Courier New',monospace" font-size="7" fill="#7000ff" letter-spacing="2">WELLNESS SYSTEM</text>
</svg>
